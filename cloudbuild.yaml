# このビルドを実行する Service Account を明示
serviceAccount: cloud-build-runner-tf@${PROJECT_ID}.iam.gserviceaccount.com

steps:
  # ステップ 1: Dockerイメージのビルド
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-northeast1-docker.pkg.dev/$PROJECT_ID/vizshare/vizshare-image:$COMMIT_SHA",
        "-f",
        "backend/docker/Dockerfile.prod",
        "backend",
      ]

  # ステップ 2: Docker イメージを Artifact Registry にプッシュ
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-northeast1-docker.pkg.dev/$PROJECT_ID/vizshare/vizshare-image:$COMMIT_SHA",
      ]

  # ステップ 3: Cloud Runにデプロイ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      [
        "gcloud",
        "run",
        "deploy",
        "vizshare",
        "--image",
        "asia-northeast1-docker.pkg.dev/$PROJECT_ID/vizshare/vizshare-image:$COMMIT_SHA",
        "--region",
        "asia-northeast1",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--service-account",
        "django-app-sa@$PROJECT_ID.iam.gserviceaccount.com",
      ]

# オプション: ロギング設定
options:
  logging: CLOUD_LOGGING_ONLY

# タイムアウト設定（600秒 = 10分）
timeout: 600s
